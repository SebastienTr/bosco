<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 640" fill="none">
  <!-- Phone outline -->
  <rect x="40" y="20" width="280" height="600" rx="24" stroke="#1B2D4F" stroke-width="3" fill="#F1F5F9"/>
  <!-- Screen -->
  <rect x="52" y="60" width="256" height="520" rx="8" fill="white"/>
  <!-- Export dialog -->
  <rect x="68" y="160" width="224" height="300" rx="12" fill="white" stroke="#94A3B8" stroke-width="1"/>
  <text x="180" y="196" text-anchor="middle" fill="#1B2D4F" font-size="16" font-weight="bold" font-family="system-ui">Export Format</text>
  <!-- Format options -->
  <rect x="84" y="220" width="192" height="44" rx="8" fill="#F1F5F9" stroke="#94A3B8" stroke-width="1"/>
  <text x="180" y="248" text-anchor="middle" fill="#94A3B8" font-size="14" font-family="system-ui">KML</text>
  <rect x="84" y="276" width="192" height="44" rx="8" fill="#2563EB" stroke="#2563EB" stroke-width="2"/>
  <text x="180" y="304" text-anchor="middle" fill="white" font-size="14" font-weight="bold" font-family="system-ui">GPX</text>
  <rect x="84" y="332" width="192" height="44" rx="8" fill="#F1F5F9" stroke="#94A3B8" stroke-width="1"/>
  <text x="180" y="360" text-anchor="middle" fill="#94A3B8" font-size="14" font-family="system-ui">CSV</text>
  <!-- Export button -->
  <rect x="84" y="400" width="192" height="44" rx="8" fill="#E8614D"/>
  <text x="180" y="428" text-anchor="middle" fill="white" font-size="14" font-weight="bold" font-family="system-ui">Export</text>
  <!-- Step number -->
  <circle cx="310" cy="298" r="16" fill="#E8614D"/>
  <text x="310" y="304" text-anchor="middle" fill="white" font-size="18" font-weight="bold" font-family="system-ui">3</text>
</svg>
