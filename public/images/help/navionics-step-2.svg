<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 640" fill="none">
  <!-- Phone outline -->
  <rect x="40" y="20" width="280" height="600" rx="24" stroke="#1B2D4F" stroke-width="3" fill="#F1F5F9"/>
  <!-- Screen -->
  <rect x="52" y="60" width="256" height="520" rx="8" fill="#D4E8F7"/>
  <!-- Map background with route -->
  <path d="M100 400 C120 350, 160 320, 200 300 C240 280, 260 250, 240 200 C220 160, 180 140, 160 180" stroke="#2563EB" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Start marker -->
  <circle cx="100" cy="400" r="8" fill="#10B981"/>
  <!-- End marker -->
  <circle cx="160" cy="180" r="8" fill="#E8614D"/>
  <!-- Selected track info panel -->
  <rect x="52" y="460" width="256" height="120" rx="8" fill="white"/>
  <text x="76" y="492" fill="#1B2D4F" font-size="15" font-weight="bold" font-family="system-ui">Summer cruise 2025</text>
  <text x="76" y="514" fill="#94A3B8" font-size="12" font-family="system-ui">42.3 nm - 8h 22m</text>
  <!-- Step number -->
  <circle cx="310" cy="490" r="16" fill="#E8614D"/>
  <text x="310" y="496" text-anchor="middle" fill="white" font-size="18" font-weight="bold" font-family="system-ui">2</text>
</svg>
