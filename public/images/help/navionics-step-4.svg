<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 640" fill="none">
  <!-- Phone outline -->
  <rect x="40" y="20" width="280" height="600" rx="24" stroke="#1B2D4F" stroke-width="3" fill="#F1F5F9"/>
  <!-- Screen -->
  <rect x="52" y="60" width="256" height="520" rx="8" fill="white"/>
  <!-- Share sheet -->
  <rect x="52" y="340" width="256" height="240" rx="16" fill="white" stroke="#94A3B8" stroke-width="1"/>
  <rect x="160" y="348" width="40" height="4" rx="2" fill="#94A3B8"/>
  <!-- Share options row -->
  <circle cx="108" cy="408" r="24" fill="#F1F5F9" stroke="#94A3B8" stroke-width="1"/>
  <text x="108" y="412" text-anchor="middle" fill="#334155" font-size="10" font-family="system-ui">Files</text>
  <circle cx="180" cy="408" r="24" fill="#2563EB"/>
  <text x="180" y="412" text-anchor="middle" fill="white" font-size="10" font-weight="bold" font-family="system-ui">Bosco</text>
  <circle cx="252" cy="408" r="24" fill="#F1F5F9" stroke="#94A3B8" stroke-width="1"/>
  <text x="252" y="412" text-anchor="middle" fill="#334155" font-size="10" font-family="system-ui">Mail</text>
  <!-- Labels -->
  <text x="108" y="448" text-anchor="middle" fill="#334155" font-size="10" font-family="system-ui">Save to</text>
  <text x="108" y="460" text-anchor="middle" fill="#334155" font-size="10" font-family="system-ui">Files</text>
  <text x="180" y="448" text-anchor="middle" fill="#2563EB" font-size="10" font-weight="bold" font-family="system-ui">Open in</text>
  <text x="180" y="460" text-anchor="middle" fill="#2563EB" font-size="10" font-weight="bold" font-family="system-ui">Bosco</text>
  <text x="252" y="454" text-anchor="middle" fill="#334155" font-size="10" font-family="system-ui">Mail</text>
  <!-- GPX file indicator at top -->
  <rect x="68" y="180" width="224" height="60" rx="8" fill="#F1F5F9"/>
  <text x="180" y="206" text-anchor="middle" fill="#1B2D4F" font-size="14" font-weight="600" font-family="system-ui">summer-cruise-2025.gpx</text>
  <text x="180" y="226" text-anchor="middle" fill="#94A3B8" font-size="11" font-family="system-ui">GPX File - 245 KB</text>
  <!-- Step number -->
  <circle cx="310" cy="408" r="16" fill="#E8614D"/>
  <text x="310" y="414" text-anchor="middle" fill="white" font-size="18" font-weight="bold" font-family="system-ui">4</text>
</svg>
