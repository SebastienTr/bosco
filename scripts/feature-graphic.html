<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1024px;
    height: 500px;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  .container {
    width: 1024px;
    height: 500px;
    background: linear-gradient(135deg, #0f1b2d 0%, #1B2D4F 40%, #2a4a7f 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }
  /* Wave decoration */
  .wave {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 120px;
    opacity: 0.1;
  }
  .wave svg { width: 100%; height: 100%; }
  .wave2 {
    position: absolute;
    bottom: -20px;
    left: 0;
    width: 100%;
    height: 100px;
    opacity: 0.07;
  }
  /* Compass rose decoration */
  .compass {
    position: absolute;
    right: 80px;
    top: 50%;
    transform: translateY(-50%);
    width: 280px;
    height: 280px;
    border: 2px solid rgba(255,255,255,0.08);
    border-radius: 50%;
  }
  .compass::after {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 200px;
    height: 200px;
    border: 1px solid rgba(255,255,255,0.05);
    border-radius: 50%;
  }
  .compass-line {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 1px;
    height: 280px;
    background: rgba(255,255,255,0.06);
    transform-origin: top center;
  }
  .compass-line:nth-child(1) { transform: translate(-50%, -50%) rotate(0deg); }
  .compass-line:nth-child(2) { transform: translate(-50%, -50%) rotate(45deg); }
  .compass-line:nth-child(3) { transform: translate(-50%, -50%) rotate(90deg); }
  .compass-line:nth-child(4) { transform: translate(-50%, -50%) rotate(135deg); }
  /* Track line decoration */
  .track {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    opacity: 0.12;
  }
  /* Content */
  .content {
    position: relative;
    z-index: 2;
    text-align: left;
    padding-left: 80px;
    max-width: 600px;
  }
  .app-name {
    font-size: 64px;
    font-weight: 700;
    color: #ffffff;
    letter-spacing: -1px;
    line-height: 1.1;
  }
  .app-name span {
    color: #5ba3e6;
  }
  .tagline {
    font-size: 24px;
    color: rgba(255,255,255,0.75);
    margin-top: 16px;
    font-weight: 400;
    line-height: 1.4;
  }
  .keywords {
    margin-top: 28px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }
  .keyword {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.15);
    color: rgba(255,255,255,0.8);
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 500;
  }
  /* Dots pattern */
  .dots {
    position: absolute;
    top: 40px;
    right: 40px;
    display: grid;
    grid-template-columns: repeat(5, 8px);
    gap: 12px;
    opacity: 0.1;
  }
  .dot {
    width: 4px;
    height: 4px;
    background: white;
    border-radius: 50%;
  }
</style>
</head>
<body>
<div class="container">
  <!-- Track SVG decoration -->
  <svg class="track" viewBox="0 0 1024 500" fill="none">
    <path d="M-20 380 Q 200 320, 350 350 T 600 280 T 850 320 T 1044 250" stroke="white" stroke-width="2.5" fill="none" stroke-dasharray="8 6"/>
    <path d="M-20 420 Q 250 380, 400 400 T 700 340 T 1044 300" stroke="white" stroke-width="1.5" fill="none" stroke-dasharray="4 8"/>
  </svg>

  <!-- Wave decoration -->
  <div class="wave">
    <svg viewBox="0 0 1024 120" preserveAspectRatio="none">
      <path d="M0 60 Q 128 20, 256 60 T 512 60 T 768 60 T 1024 60 L 1024 120 L 0 120 Z" fill="white"/>
    </svg>
  </div>

  <!-- Compass -->
  <div class="compass">
    <div class="compass-line"></div>
    <div class="compass-line"></div>
    <div class="compass-line"></div>
    <div class="compass-line"></div>
  </div>

  <!-- Content -->
  <div class="content">
    <div class="app-name">Bosco</div>
    <div class="tagline">Your sailing story,<br>traced on the map.</div>
    <div class="keywords">
      <span class="keyword">GPS Tracks</span>
      <span class="keyword">Navionics</span>
      <span class="keyword">Voyage Journal</span>
      <span class="keyword">Share</span>
    </div>
  </div>
</div>
</body>
</html>
